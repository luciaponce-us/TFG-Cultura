name: Prettier Frontend CI

on:
  push:
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: write

jobs:
  prettier-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" "*.{js,ts,json,md}"

  prettier-fix:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier write
        run: npx prettier --write "src/**/*.{ts,tsx,js,jsx,json,css,md}" "*.{js,ts,json,md}"

      - name: Auto-commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(frontend): apply prettier formatting [skip ci]"
          file_pattern: frontend/src/**/* frontend/*.js frontend/*.ts frontend/*.json frontend/*.md
