name: Backend Tests CI

on:
  push:
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: root
          MONGO_INITDB_DATABASE: mydatabase

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw
        working-directory: backend

      - name: Ejecutar tests backend
        working-directory: backend
        env:
          MONGODB_URI: mongodb://root:root@localhost:27018/mydatabase?authSource=admin
          SPRING_DATA_MONGODB_URI: mongodb://root:root@localhost:27018/mydatabase?authSource=admin
          SPRING_MONGODB_URI: mongodb://root:root@localhost:27018/mydatabase?authSource=admin
        run: ./mvnw test --no-transfer-progress