name: SonarQube Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
    build-and-analyze:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout código
          uses: actions/checkout@v4

        - name: Setup JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: maven

        - name: Cache Maven y SonarCloud
          uses: actions/cache@v4
          with:
            path: |
                ~/.m2/repository
                ~/.sonar/cache
            key: ${{ runner.os }}-sonar-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
                ${{ runner.os }}-sonar-

        - name: Build, test y análisis SonarCloud
          working-directory: ./backend
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: mvn verify sonar:sonar --no-transfer-progress
           -Dsonar.projectKey=luciaponce-us_TFG-Cultura
           -Dsonar.organization=luciaponce-us
           -Dsonar.host.url=https://sonarcloud.io