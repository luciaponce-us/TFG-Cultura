services:
  mongo:
    image: mongo:7
    container_name: mongo-local
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-root}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mydatabase}
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    container_name: tfg-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongo:27017/${MONGO_DB:-mydatabase}?authSource=admin}
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongo:27017/${MONGO_DB:-mydatabase}?authSource=admin}
      SPRING_MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongo:27017/${MONGO_DB:-mydatabase}?authSource=admin}
      SPRING_MONGODB_DATABASE: ${MONGO_DB:-mydatabase}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-DEBUG}
    volumes:
      - ./backend:/app
      - backend_m2_cache:/root/.m2
    command: ./mvnw spring-boot:run
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: tfg-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_m2_cache: